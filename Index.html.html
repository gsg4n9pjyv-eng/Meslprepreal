<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Prep Recipe Book</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232637;
  --surface3: #2b2f45;
  --accent: #e87c3e;
  --accent2: #f5a623;
  --green: #4caf82;
  --blue: #5b8cf7;
  --text: #e8eaf0;
  --muted: #7a7f98;
  --border: #2e3147;
  --card-hover: #20233a;
  --radius: 10px;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* ── HEADER ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex; align-items: center; gap: 16px; flex-shrink: 0; flex-wrap: wrap;
}
.header-title { font-size: 1rem; font-weight: 700; color: var(--accent); white-space: nowrap; }
.header-title span { color: var(--muted); font-weight: 400; font-size: 0.78rem; margin-left: 8px; }

.week-selector {
  display: flex; align-items: center; gap: 6px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 10px;
}
.week-selector label { font-size: 0.72rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap; }
.week-select {
  background: transparent; border: none; color: var(--text); font-size: 0.85rem;
  font-weight: 600; cursor: pointer; outline: none; min-width: 100px;
}
.week-select option { background: var(--surface2); }

.add-week-btn {
  background: var(--surface2); border: 1px dashed var(--border); color: var(--muted);
  padding: 5px 10px; border-radius: var(--radius); font-size: 0.78rem; cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
}
.add-week-btn:hover { border-color: var(--accent); color: var(--accent); }

.delete-week-btn {
  background: transparent; border: none; color: var(--muted); font-size: 0.75rem;
  cursor: pointer; padding: 4px 6px; border-radius: 6px; transition: all 0.15s;
}
.delete-week-btn:hover { color: #e05555; background: rgba(224,85,85,0.1); }

.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.view-tabs { display: flex; background: var(--surface2); border-radius: var(--radius); padding: 3px; gap: 2px; }
.view-tab { padding: 5px 14px; border-radius: 7px; border: none; cursor: pointer; font-size: 0.78rem; font-weight: 600; background: transparent; color: var(--muted); transition: all 0.15s; }
.view-tab.active { background: var(--accent); color: white; }

/* ── LAYOUT ── */
.app-body { display: flex; flex: 1; overflow: hidden; }

/* ── BROWSER ── */
.browser { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.browser-toolbar { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
.search-input {
  flex: 1; min-width: 160px; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 7px 12px; border-radius: 8px; font-size: 0.83rem; outline: none;
}
.search-input:focus { border-color: var(--accent); }
.filter-select {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 7px 10px; border-radius: 8px; font-size: 0.78rem; outline: none; cursor: pointer;
}
.filter-select:focus { border-color: var(--accent); }
.browser-scroll { flex: 1; overflow-y: auto; padding: 14px 16px; }
.results-count { font-size: 0.72rem; color: var(--muted); margin-bottom: 10px; }
.cat-section { margin-bottom: 24px; }
.cat-title { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--accent2); margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
.recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }

.recipe-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 11px 13px; cursor: pointer; transition: all 0.12s; user-select: none; position: relative;
}
.recipe-card:hover { background: var(--card-hover); border-color: var(--accent); transform: translateY(-1px); }
.recipe-card.in-week { border-color: var(--green); background: #172a21; }
.recipe-card.in-week::after { content: '✓'; position: absolute; top: 9px; right: 11px; color: var(--green); font-weight: 700; font-size: 0.85rem; }
.recipe-name { font-size: 0.83rem; font-weight: 600; line-height: 1.3; margin-bottom: 7px; padding-right: 18px; }
.recipe-pills { display: flex; gap: 5px; flex-wrap: wrap; }
.pill { font-size: 0.66rem; padding: 2px 6px; border-radius: 4px; font-weight: 600; background: var(--surface2); }
.pill.cal { color: var(--accent2); }
.pill.pro { color: var(--green); }
.pill.src { color: #8aa4cf; }
.pill.srv { color: #b8a4cf; }

/* ── SIDE PANEL ── */
.side-panel { width: 340px; min-width: 300px; border-left: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }

/* WEEK PLAN TAB */
.week-view { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
.week-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.week-header h2 { font-size: 0.92rem; font-weight: 700; margin-bottom: 4px; }
.week-header p { font-size: 0.72rem; color: var(--muted); line-height: 1.4; }
.week-scroll { flex: 1; overflow-y: auto; padding: 10px 14px; }

.week-meal-item {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  padding: 9px 11px; margin-bottom: 6px; transition: border-color 0.12s;
}
.week-meal-item:hover { border-color: var(--border); }
.meal-info { flex: 1; min-width: 0; }
.meal-name { font-size: 0.8rem; font-weight: 600; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.meal-meta { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }
.remove-meal { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; line-height: 1; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; transition: all 0.12s; }
.remove-meal:hover { color: #e05555; background: rgba(224,85,85,0.1); }

.week-empty { text-align: center; padding: 30px 16px; color: var(--muted); font-size: 0.8rem; line-height: 1.6; }
.week-empty .icon { font-size: 2rem; margin-bottom: 8px; }

.week-footer { padding: 10px 14px; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; gap: 6px; }
.btn { padding: 7px 12px; border-radius: 7px; border: none; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.btn-green { background: var(--green); color: white; }
.btn-green:hover { background: #3a9068; }
.btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--muted); }
.btn-full { flex: 1; }

/* SHOPPING LIST TAB */
.shop-view { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
.shop-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.shop-header h2 { font-size: 0.92rem; font-weight: 700; margin-bottom: 4px; }
.shop-header p { font-size: 0.72rem; color: var(--muted); }
.shop-week-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.shop-week-tab {
  padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--muted); font-size: 0.72rem; font-weight: 600;
  cursor: pointer; transition: all 0.12s;
}
.shop-week-tab.active { background: var(--accent); border-color: var(--accent); color: white; }
.shop-week-tab:hover:not(.active) { border-color: var(--muted); color: var(--text); }
.shop-scroll { flex: 1; overflow-y: auto; padding: 10px 14px; }
.shop-section { margin-bottom: 18px; }
.shop-section-title { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--accent2); margin-bottom: 7px; }
.shop-item { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 0.79rem; line-height: 1.4; }
.shop-item:last-child { border-bottom: none; }
.shop-check { width: 15px; height: 15px; border-radius: 3px; border: 1.5px solid var(--border); flex-shrink: 0; margin-top: 2px; cursor: pointer; accent-color: var(--green); }
.item-text { flex: 1; }
.item-recipe { font-size: 0.62rem; color: var(--muted); margin-top: 1px; }
.shop-empty { text-align: center; padding: 30px 16px; color: var(--muted); font-size: 0.8rem; line-height: 1.6; }
.shop-empty .icon { font-size: 2rem; margin-bottom: 8px; }
.shop-footer { padding: 10px 14px; border-top: 1px solid var(--border); flex-shrink: 0; }

/* ── MODAL ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; display: none; align-items: center; justify-content: center; padding: 16px; }
.overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 440px; max-height: 85vh; overflow-y: auto; padding: 20px; }
.modal-name { font-size: 1rem; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }
.modal-sub { font-size: 0.7rem; color: var(--muted); margin-bottom: 12px; }
.modal-macros { display: flex; gap: 8px; margin-bottom: 14px; }
.modal-macro { flex: 1; background: var(--surface2); border-radius: 8px; padding: 8px; text-align: center; }
.modal-macro .v { font-size: 1rem; font-weight: 700; }
.modal-macro .l { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; }
.modal-section-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 8px; }
.modal-ing { font-size: 0.8rem; padding: 5px 0; border-bottom: 1px solid var(--border); }
.modal-ing:last-child { border-bottom: none; }
.modal-footer { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
.week-add-row { display: flex; gap: 6px; align-items: center; flex: 1; }
.week-add-select { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 8px; border-radius: 7px; font-size: 0.78rem; outline: none; cursor: pointer; }

/* ── WEEK NAME MODAL ── */
.name-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; width: 100%; max-width: 320px; }
.name-modal h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 12px; }
.name-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 0.88rem; outline: none; margin-bottom: 12px; }
.name-input:focus { border-color: var(--accent); }

/* ── NO RESULTS ── */
.no-results { text-align: center; padding: 40px; color: var(--muted); font-size: 0.82rem; }

/* ── PRINT ── */
@media print {
  header, .browser, .overlay, .shop-week-tabs, .shop-footer, .view-tabs, .week-view { display: none !important; }
  body { background: white; color: black; overflow: auto; height: auto; }
  .app-body { display: block; height: auto; }
  .side-panel { width: 100%; border: none; background: white; display: block; }
  .shop-view { height: auto; overflow: visible; }
  .shop-scroll { overflow: visible; }
  .shop-item { color: black; border-color: #ddd; }
  .shop-section-title { color: #555; }
  .shop-header { border-color: #ddd; }
  .shop-header h2, .shop-header p { color: black; }
  .item-recipe { color: #888; }
}
</style>
</head>
<body>

<header>
  <div class="header-title">🍳 Meal Prep <span>123 recipes</span></div>

  <div class="week-selector">
    <label>Week</label>
    <select class="week-select" id="active-week-select" onchange="setActiveWeek(this.value)">
    </select>
    <button class="delete-week-btn" onclick="deleteWeek()" title="Delete this week">✕</button>
  </div>
  <button class="add-week-btn" onclick="promptAddWeek()">+ New week</button>

  <div class="header-right">
    <div class="view-tabs">
      <button class="view-tab active" id="tab-plan" onclick="switchPanel('plan')">This Week</button>
      <button class="view-tab" id="tab-shop" onclick="switchPanel('shop')">Shopping List</button>
    </div>
  </div>
</header>

<div class="app-body">

  <!-- RECIPE BROWSER -->
  <div class="browser">
    <div class="browser-toolbar">
      <input class="search-input" type="text" id="search" placeholder="Search 123 recipes…" oninput="renderBrowser()">
      <select class="filter-select" id="cat-filter" onchange="renderBrowser()">
        <option value="">All categories</option>
        <option>Pasta &amp; Noodles</option>
        <option>Rice Bowls</option>
        <option>Soups &amp; Stews</option>
        <option>Burritos &amp; Handheld</option>
        <option>Proteins &amp; Other</option>
        <option>Breakfast</option>
        <option>Loaded &amp; Sides</option>
      </select>
      <select class="filter-select" id="src-filter" onchange="renderBrowser()">
        <option value="">Both books</option>
        <option value="Macro Cookbook">Macro Cookbook</option>
        <option value="Stealth Health">Stealth Health</option>
      </select>
    </div>
    <div class="browser-scroll">
      <div class="results-count" id="results-count"></div>
      <div id="recipe-container"></div>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="side-panel">

    <!-- WEEK PLAN VIEW -->
    <div class="week-view" id="panel-plan">
      <div class="week-header">
        <h2 id="week-plan-title">Week Plan</h2>
        <p id="week-plan-sub">Click any recipe to add it to this week.</p>
      </div>
      <div class="week-scroll" id="week-meal-list"></div>
      <div class="week-footer">
        <button class="btn btn-green btn-full" onclick="switchPanel('shop')">View shopping list →</button>
      </div>
    </div>

    <!-- SHOPPING LIST VIEW -->
    <div class="shop-view" id="panel-shop" style="display:none">
      <div class="shop-header">
        <h2>Shopping List</h2>
        <p id="shop-sub">Ingredients grouped by aisle.</p>
        <div class="shop-week-tabs" id="shop-week-tabs"></div>
      </div>
      <div class="shop-scroll" id="shop-content"></div>
      <div class="shop-footer">
        <button class="btn btn-green btn-full" onclick="window.print()">🖨️ Print list</button>
      </div>
    </div>

  </div>
</div>

<!-- RECIPE DETAIL MODAL -->
<div class="overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal-inner"></div>
</div>

<!-- ADD WEEK MODAL -->
<div class="overlay" id="week-modal-overlay" onclick="closeWeekModal(event)">
  <div class="name-modal" onclick="event.stopPropagation()">
    <h3>Name this week</h3>
    <input class="name-input" id="week-name-input" type="text" placeholder="e.g. Jun 23 – Jun 29" maxlength="40"
      onkeydown="if(event.key==='Enter') confirmAddWeek()">
    <div style="display:flex;gap:8px;">
      <button class="btn btn-green btn-full" onclick="confirmAddWeek()">Create week</button>
      <button class="btn btn-ghost" onclick="closeWeekModal()">Cancel</button>
    </div>
  </div>
</div>

// ── STATE ──
// weeks: { id: string, name: string, meals: number[] }[]
// activeWeekId: string
// shopWeekId: string (week shown in shopping list)

let weeks = [];
let activeWeekId = null;
let shopWeekId = null;

function getWeek(id) { return weeks.find(w => w.id === id); }
function getActiveWeek() { return getWeek(activeWeekId); }

// ── WEEK MANAGEMENT ──
function initWeeks() {
  try {
    const saved = localStorage.getItem('mealprep_weeks');
    if (saved) {
      weeks = JSON.parse(saved);
      activeWeekId = localStorage.getItem('mealprep_activeWeek') || (weeks[0] && weeks[0].id);
      shopWeekId = activeWeekId;
    }
  } catch(e) {}
  if (weeks.length === 0) {
    addWeek('This Week', false);
  }
  renderWeekSelector();
}

function saveState() {
  try {
    localStorage.setItem('mealprep_weeks', JSON.stringify(weeks));
    localStorage.setItem('mealprep_activeWeek', activeWeekId || '');
  } catch(e) {}
}

function addWeek(name, render=true) {
  const id = 'week_' + Date.now();
  weeks.push({ id, name, meals: [] });
  activeWeekId = id;
  shopWeekId = id;
  saveState();
  if (render) { renderWeekSelector(); renderWeekPanel(); renderBrowser(); renderShopView(); }
  return id;
}

function deleteWeek() {
  if (weeks.length === 1) { alert('You need at least one week.'); return; }
  if (!confirm('Delete "' + (getActiveWeek()?.name || 'this week') + '"?')) return;
  weeks = weeks.filter(w => w.id !== activeWeekId);
  activeWeekId = weeks[0].id;
  shopWeekId = activeWeekId;
  saveState();
  renderWeekSelector();
  renderWeekPanel();
  renderBrowser();
  renderShopView();
}

function setActiveWeek(id) {
  activeWeekId = id;
  shopWeekId = id;
  saveState();
  renderWeekPanel();
  renderBrowser();
  renderShopView();
}

function promptAddWeek() {
  const d = new Date();
  const mon = new Date(d); mon.setDate(d.getDate() - d.getDay() + 1);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const fmt = dt => dt.toLocaleDateString('en-US', {month:'short', day:'numeric'});
  document.getElementById('week-name-input').value = fmt(mon) + ' – ' + fmt(sun);
  document.getElementById('week-modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('week-name-input').select(), 50);
}

function confirmAddWeek() {
  const name = document.getElementById('week-name-input').value.trim() || 'New Week';
  closeWeekModal();
  addWeek(name);
  switchPanel('plan');
}

function closeWeekModal(e) {
  if (!e || e.target === document.getElementById('week-modal-overlay')) {
    document.getElementById('week-modal-overlay').classList.remove('open');
  }
}

// ── MEAL MANAGEMENT ──
function addMealToWeek(recipeIdx, weekId) {
  const week = getWeek(weekId);
  if (!week) return;
  if (!week.meals.includes(recipeIdx)) week.meals.push(recipeIdx);
  saveState();
  renderWeekPanel();
  renderBrowser();
  renderShopView();
}

function removeMealFromWeek(recipeIdx, weekId) {
  const week = getWeek(weekId);
  if (!week) return;
  week.meals = week.meals.filter(i => i !== recipeIdx);
  saveState();
  renderWeekPanel();
  renderBrowser();
  renderShopView();
}

function toggleMealInActiveWeek(recipeIdx) {
  const week = getActiveWeek();
  if (!week) return;
  if (week.meals.includes(recipeIdx)) {
    removeMealFromWeek(recipeIdx, activeWeekId);
  } else {
    addMealToWeek(recipeIdx, activeWeekId);
  }
}

// ── RENDER WEEK SELECTOR ──
function renderWeekSelector() {
  const sel = document.getElementById('active-week-select');
  sel.innerHTML = weeks.map(w =>
    `<option value="${w.id}" ${w.id === activeWeekId ? 'selected' : ''}>${w.name}</option>`
  ).join('');
}

// ── RENDER WEEK PANEL ──
function renderWeekPanel() {
  const week = getActiveWeek();
  const titleEl = document.getElementById('week-plan-title');
  const subEl = document.getElementById('week-plan-sub');
  const listEl = document.getElementById('week-meal-list');

  if (!week) { listEl.innerHTML = ''; return; }
  titleEl.textContent = week.name;

  if (week.meals.length === 0) {
    subEl.textContent = 'Click any recipe to add it to this week.';
    listEl.innerHTML = `<div class="week-empty"><div class="icon">📋</div><p>No meals planned yet.<br>Click a recipe on the left to add it.</p></div>`;
    return;
  }

  subEl.textContent = `${week.meals.length} meal${week.meals.length !== 1 ? 's' : ''} planned`;
  listEl.innerHTML = week.meals.map(idx => {
    const r = RECIPES[idx];
    if (!r) return '';
    return `<div class="week-meal-item">
      <div class="meal-info">
        <div class="meal-name" title="${r.name}">${r.name}</div>
        <div class="meal-meta">${r.calories ? r.calories + ' cal · ' : ''}${r.protein ? r.protein + 'g P · ' : ''}${r.servings ? r.servings + ' srv' : ''}</div>
      </div>
      <button class="remove-meal" onclick="removeMealFromWeek(${idx}, '${activeWeekId}')" title="Remove">×</button>
    </div>`;
  }).join('');
}

// ── RENDER SHOPPING VIEW ──
function renderShopView() {
  // Render week tabs
  const tabsEl = document.getElementById('shop-week-tabs');
  tabsEl.innerHTML = weeks.map(w =>
    `<button class="shop-week-tab ${w.id === shopWeekId ? 'active' : ''}" onclick="setShopWeek('${w.id}')">${w.name}</button>`
  ).join('');

  const week = getWeek(shopWeekId);
  const subEl = document.getElementById('shop-sub');
  const contentEl = document.getElementById('shop-content');

  if (!week || week.meals.length === 0) {
    subEl.textContent = 'No meals planned for this week.';
    contentEl.innerHTML = `<div class="shop-empty"><div class="icon">🛒</div><p>Add meals to "${week ? week.name : 'a week'}" to generate a shopping list.</p></div>`;
    return;
  }

  subEl.textContent = `${week.meals.length} meals · ${week.name}`;

  // Collect ingredients
  const items = [];
  week.meals.forEach(idx => {
    const r = RECIPES[idx];
    if (!r) return;
    r.ingredients.forEach(ing => items.push({ ing, recipe: r.name }));
  });

  // Categorize
  function catIng(ing) {
    const i = ing.toLowerCase();
    if (i.match(/chicken|beef|pork|turkey|sausage|meatball|brisket|birria|ground meat|steak|lamb/)) return '🥩 Meat';
    if (i.match(/pasta|rice|orzo|noodle|banza|mac|macaroni|ramen|spaghetti|penne|fettuccine|grain/)) return '🍝 Grains & Pasta';
    if (i.match(/cheese|yogurt|milk|cream|cottage|cheddar|mozzarella|parmesan|mayo|sour cream/)) return '🧀 Dairy';
    if (i.match(/pepper|onion|garlic|tomato|cilantro|lime|lemon|celery|jalape|chile|chili|green onion|bell pepper|avocado|spinach|veggie|vegetable|broccoli|carrot|corn|pea|mushroom|zucchini|squash|potato|sweet potato|scallion|shallot/)) return '🥬 Produce';
    if (i.match(/soy sauce|miso|adobo|chipotle|sriracha|hot sauce|harissa|gochujang|vinegar|maple|honey|ketchup|mirin|sesame|peanut butter|tahini|enchilada|salsa|teriyaki|worcestershire|oyster sauce|fish sauce|hoisin|buffalo sauce|ranch/)) return '🫙 Sauces & Condiments';
    if (i.match(/cumin|paprika|salt|black pepper|powder|seasoning|oregano|thyme|rosemary|basil|bay|cinnamon|cayenne|chili powder|garlic powder|onion powder|turmeric|coriander|chili flakes|red pepper flakes/)) return '🌿 Spices';
    if (i.match(/olive oil|vegetable oil|butter|oil|cooking spray/)) return '🫒 Oils & Fats';
    if (i.match(/can |canned|fire.roasted|diced tomato|tomato paste|enchilada sauce|broth|stock|coconut milk|green chile|corn starch|flour|bread crumb|panko|bean|chickpea|lentil/)) return '🥫 Canned & Pantry';
    if (i.match(/egg|bread|tortilla|bun|bagel|pizza|roll|biscuit/)) return '🥚 Eggs & Bread';
    return '📦 Other';
  }

  const grouped = {};
  items.forEach(item => {
    const cat = catIng(item.ing);
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(item);
  });

  const order = ['🥩 Meat','🥬 Produce','🧀 Dairy','🍝 Grains & Pasta','🫙 Sauces & Condiments','🥫 Canned & Pantry','🌿 Spices','🫒 Oils & Fats','🥚 Eggs & Bread','📦 Other'];
  const allCats = [...order.filter(c => grouped[c]), ...Object.keys(grouped).filter(c => !order.includes(c))];

  contentEl.innerHTML = allCats.map(cat => `
    <div class="shop-section">
      <div class="shop-section-title">${cat}</div>
      ${grouped[cat].map(({ing, recipe}) => `
        <div class="shop-item">
          <input type="checkbox" class="shop-check" onchange="this.nextElementSibling.style.opacity=this.checked?'0.4':'1'">
          <div class="item-text">
            ${ing}
            <div class="item-recipe">${recipe}</div>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

function setShopWeek(id) {
  shopWeekId = id;
  renderShopView();
}

// ── BROWSER ──
function renderBrowser() {
  const query = document.getElementById('search').value.toLowerCase();
  const catFilter = document.getElementById('cat-filter').value;
  const srcFilter = document.getElementById('src-filter').value;
  const activeWeekMeals = getActiveWeek()?.meals || [];

  let filtered = RECIPES.filter((r, i) => {
    if (query && !r.name.toLowerCase().includes(query)) return false;
    if (catFilter && r.category !== catFilter) return false;
    if (srcFilter && r.source !== srcFilter) return false;
    return true;
  });

  document.getElementById('results-count').textContent =
    `${filtered.length} recipe${filtered.length !== 1 ? 's' : ''}`;

  const cats = {};
  filtered.forEach(r => {
    if (!cats[r.category]) cats[r.category] = [];
    cats[r.category].push(r);
  });

  const catOrder = ['Rice Bowls','Pasta & Noodles','Soups & Stews','Burritos & Handheld','Proteins & Other','Breakfast','Loaded & Sides'];
  const sortedCats = [...catOrder.filter(c => cats[c]), ...Object.keys(cats).filter(c => !catOrder.includes(c))];

  if (filtered.length === 0) {
    document.getElementById('recipe-container').innerHTML = '<div class="no-results">No recipes match your search.</div>';
    return;
  }

  document.getElementById('recipe-container').innerHTML = sortedCats.map(cat => `
    <div class="cat-section">
      <div class="cat-title">${cat} (${cats[cat].length})</div>
      <div class="recipe-grid">
        ${cats[cat].map(r => {
          const idx = RECIPES.indexOf(r);
          const inWeek = activeWeekMeals.includes(idx);
          return `<div class="recipe-card ${inWeek ? 'in-week' : ''}"
            onclick="toggleMealInActiveWeek(${idx})"
            ondblclick="openModal(${idx}); event.stopPropagation();">
            <div class="recipe-name">${r.name}</div>
            <div class="recipe-pills">
              ${r.calories ? `<span class="pill cal">${r.calories} cal</span>` : ''}
              ${r.protein ? `<span class="pill pro">${r.protein}g P</span>` : ''}
              ${r.servings ? `<span class="pill srv">${r.servings} srv</span>` : ''}
              <span class="pill src">${r.source === 'Macro Cookbook' ? 'MC' : 'SH'}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

// ── MODAL ──
function openModal(idx) {
  const r = RECIPES[idx];
  const week = getActiveWeek();
  const inWeek = week?.meals.includes(idx);

  document.getElementById('modal-inner').innerHTML = `
    <div class="modal-name">${r.name}</div>
    <div class="modal-sub">${r.source} · ${r.category}${r.servings ? ' · ' + r.servings + ' servings' : ''}</div>
    ${(r.calories || r.protein || r.carbs || r.fat) ? `
    <div class="modal-macros">
      ${r.calories ? `<div class="modal-macro"><div class="v" style="color:var(--accent2)">${r.calories}</div><div class="l">cal</div></div>` : ''}
      ${r.protein ? `<div class="modal-macro"><div class="v" style="color:var(--green)">${r.protein}g</div><div class="l">protein</div></div>` : ''}
      ${r.carbs ? `<div class="modal-macro"><div class="v" style="color:#8aa4cf">${r.carbs}g</div><div class="l">carbs</div></div>` : ''}
      ${r.fat ? `<div class="modal-macro"><div class="v" style="color:#cf9a6b">${r.fat}g</div><div class="l">fat</div></div>` : ''}
    </div>` : ''}
    <div class="modal-section-label">Ingredients (${r.ingredients.length})</div>
    ${r.ingredients.map(i => `<div class="modal-ing">${i}</div>`).join('')}
    <div class="modal-footer">
      <div class="week-add-row">
        <select class="week-add-select" id="modal-week-select">
          ${weeks.map(w => `<option value="${w.id}" ${w.id === activeWeekId ? 'selected' : ''}>${w.name}</option>`).join('')}
        </select>
        <button class="btn ${inWeek ? 'btn-ghost' : 'btn-green'}" id="modal-add-btn"
          onclick="modalToggleMeal(${idx})">
          ${inWeek ? '✓ In plan' : '+ Add to week'}
        </button>
      </div>
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
    </div>`;

  document.getElementById('modal-overlay').classList.add('open');
}

function modalToggleMeal(idx) {
  const weekId = document.getElementById('modal-week-select').value;
  const week = getWeek(weekId);
  if (!week) return;
  if (week.meals.includes(idx)) {
    removeMealFromWeek(idx, weekId);
    document.getElementById('modal-add-btn').textContent = '+ Add to week';
    document.getElementById('modal-add-btn').className = 'btn btn-green';
  } else {
    addMealToWeek(idx, weekId);
    document.getElementById('modal-add-btn').textContent = '✓ In plan';
    document.getElementById('modal-add-btn').className = 'btn btn-ghost';
  }
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── PANEL SWITCHING ──
function switchPanel(panel) {
  document.getElementById('panel-plan').style.display = panel === 'plan' ? 'flex' : 'none';
  document.getElementById('panel-shop').style.display = panel === 'shop' ? 'flex' : 'none';
  document.getElementById('tab-plan').classList.toggle('active', panel === 'plan');
  document.getElementById('tab-shop').classList.toggle('active', panel === 'shop');
  if (panel === 'shop') renderShopView();
}

// ── INIT ──
initWeeks();
renderBrowser();
renderWeekPanel();
</script>
